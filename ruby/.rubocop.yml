plugins:
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: false

Style/HashSyntax:
  EnforcedShorthandSyntax: never

########## Gemspec Rules

# Disabling this as all the gem publishing will be done within CI and doesn't allow for user input such as an MFA code.
Gemspec/RequireMFA:
  Enabled: false

Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

########## Metrics / Max Lengths Rules

Layout/LineLength:
  Max: 200

Metrics/AbcSize:
  Max: 120

Metrics/BlockLength:
  Max: 80

Metrics/ClassLength:
  Max: 300

Metrics/MethodLength:
  Max: 150

########## RSpec Rules

# We are not strict to the point that we want to enforce super-short `it '…' do … end` blocks in our specs.
RSpec/ExampleLength:
  Enabled: false

# Same for number of let/subject
RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 2
